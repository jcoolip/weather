<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Skills</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style2.css') }}"
        />
    </head>
    >
        <div class="page_container">
            <div class="nav_card">
                <h1>
                    <a href="{{ url_for('find') }}">Job Market</a>
                </h1>
                <a href="{{ url_for('i_jobs', i_name=industry) }}"
                    >{{ industry }} </a
                ><br />

                <p><a href="{{ url_for('industries_page') }}">[ industries ]</a> <a href="{{ url_for('i_jobs', i_name=industry) }}"
                    >[ jobs ]</a></p>
            </div>
            <br />
            <div class="job_listings">
                {% for job in jobs: %}
                <b>
                    <a
                        href="{{ url_for('job_focus', i_name=industry, external_id=job.external_id, title=job.title) }}"
                        >{{ job.title }}</a
                    > </b
                ><br />
                {{ job.company }}<br />
                {{ job.state }} {{ job.country }}<br />
                <!--<a href="{{ job.source_url }}">{{ job.source }}</a><br />-->
</br>

            {% endfor %}
</div>
        </div>
    </body>
</html>
