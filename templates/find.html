<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Weather</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        {% include "css.html" %}

        <link
            rel="icon"
            href="{{ url_for('static', filename='favicon.png') }}"
            type="image/png"
        />
    </head>
    <body>
        <div class="page_container">
            {% include "nav.html" %}
            <br />
            <div class="job_listings">
                <br />
                <div class="search_area">
                    <form method="get" action="/find">
                        <input
                            type="text"
                            name="q"
                            value="{{ q or '' }}"
                            placeholder="city, state, zip..."
                        />

                        <button type="submit">Search</button>
                    </form>
                    {% if q %} {{ q }}<br />
                    Current: {{ weather["temp"] }}<br />Feels like: {{
                    weather["feels_like"] }}<br />
                    {% if weather["weather_code"] != 0.0 %}{{
                    weather["weather_code"] }}{%endif%} {% endif %} <br /><br />
                </div>
            </div>
        </div>
    </body>
</html>
